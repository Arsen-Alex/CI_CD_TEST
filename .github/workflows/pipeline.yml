name: Python Test

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Docker поднимаем
        run: docker build -t myapp .

      - name: Тесты внутри контейнера
        run: docker run myapp
        
      - name: CD процесс (Деплой)
        run: |
          mkdir -p ../staging
          cp -r . ../staging/